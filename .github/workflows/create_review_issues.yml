name: Create review issue

on:
  schedule:
    - cron: '0 0 28-31 * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: read

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Update quarterly review stats
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/review_stats.py