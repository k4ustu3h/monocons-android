name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - develop
  pull_request:

jobs:
  check-paths:
    runs-on: ubuntu-latest
    outputs:
      skip_steps: ${{ steps.filter.outputs.workflows == 'false' }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Check for changes in source files
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            workflows:
              - 'app/**'
              - 'gradle/**'
              - 'gradle.properties'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradlew'
              - 'gradlew.bat'
              - 'svg-processor/**'
              - 'svgs/**'

  build-debug-apk:
    runs-on: ubuntu-latest
    needs: check-paths
    if: needs.check-paths.outputs.skip_steps != 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: Da25KUVSE5jbGds2zXmfXw==
      - name: Write sign info
        if: github.event.repository.fork == false
        run: |
          if [ ! -z "${{ secrets.KEYSTORE }}" ]; then
            echo storePassword='${{ secrets.KEYSTORE_PASSWORD }}' >> keystore.properties
            echo keyAlias='${{ secrets.KEY_ALIAS }}' >> keystore.properties
            echo keyPassword='${{ secrets.KEY_PASSWORD }}' >> keystore.properties
            echo storeFile='${{ github.workspace }}/key.jks' >> keystore.properties
            echo ${{ secrets.KEYSTORE }} | base64 --decode > ${{ github.workspace }}/key.jks
          fi
      - name: Build debug APK
        run: ./gradlew app:assembleDebug
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Debug APK
          path: app/build/outputs/apk/app/debug/*.apk

  run-unit-tests:
    runs-on: ubuntu-latest
    needs: check-paths
    if: needs.check-paths.outputs.skip_steps != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: Da25KUVSE5jbGds2zXmfXw==
      - name: Run unit tests
        run: ./gradlew app:testDebugUnitTest

  check-style:
    runs-on: ubuntu-latest
    needs: check-paths
    if: needs.check-paths.outputs.skip_steps != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew spotlessCheck

  send-notifications:
    runs-on: ubuntu-latest
    needs: [ build-debug-apk, run-unit-tests, check-style, check-paths ]
    if: always() && needs.check-paths.result == 'success'
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install gitpython requests
      - name: Download artifact
        if: needs.build-debug-apk.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: Debug APK
          path: artifacts/debug-apk
      - name: Send notifications
        run: python send_notifications.py
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          TELEGRAM_CI_BOT_TOKEN: ${{ secrets.TELEGRAM_CI_BOT_TOKEN }}
          TELEGRAM_CI_CHANNEL_ID: ${{ secrets.TELEGRAM_CI_CHANNEL_ID }}
          ARTIFACT_DIRECTORY: artifacts/debug-apk
          GITHUB_REF: ${{ github.ref }}
          DISCORD_CI_BOT_TOKEN: ${{ secrets.DISCORD_CI_BOT_TOKEN }}

  nightly-release:
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false && github.event_name == 'push' && needs.check-paths.outputs.skip_steps != 'true'
    needs: [ build-debug-apk, check-paths ]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: Debug APK
          path: artifacts/debug-apk
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Export APK_NAME
        run: echo "APK_NAME=Lawnicons.Nightly.$(echo ${{ github.sha }} | cut -c1-7).apk" >> $GITHUB_ENV
      - name: Rename .apk file
        run: mv artifacts/debug-apk/*.apk $APK_NAME
      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python .github/scripts/nightly_notes.py > release_notes.md
      - name: Delete release if exist then create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "nightly" && gh release delete "nightly" -y --cleanup-tag
          gh release create "nightly" "$APK_NAME" \
            -p \
            -t "Lawnicons Nightly" \
            --notes-file release_notes.md
