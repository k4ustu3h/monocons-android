name: Icon Linter

on:
  pull_request_target:
    branches: [ develop ]
    types: [ opened, synchronize, reopened ]
    paths:
      - svgs/*

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    runs-on: ubuntu-latest
    # Only run on user for testing
    if: ${{ github.event.pull_request.user.login == 'x9136' }}
    steps:
      - name: Wait for checklist comment
        id: wait_checklist
        uses: actions/github-script@v9
        env:
          EXCLUDED_USERS: ${{ vars.EXCLUDED_USERS }}    
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = "<!-- icon-checklist-posted -->";
            const maxAttempts = 24;  // 24 * 5s = 2 minutes
            const sleepMs = 5000;

            const excludedUsers = process.env.EXCLUDED_USERS ?
            process.env.EXCLUDED_USERS.split(',').map(user => user.trim()) : [];

            const prAuthor = context.payload.pull_request.user.login;

            if (excludedUsers.includes(prAuthor)) {
              console.log(`Skipping wait for excluded user: ${prAuthor}`);
              return;
            }

            let found = false;
            for (let i = 0; i < maxAttempts; i++) {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo, issue_number, per_page: 100
              });
              found = comments.some(c => (c.body || "").includes(marker));
              if (found) break;
              await new Promise(r => setTimeout(r, sleepMs));
            }

            core.setOutput("checklist_found", String(found));
            if (!found) core.warning("Checklist comment not found before timeout; continuing anyway.");

      - name: Checkout trusted base code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: trusted
          fetch-depth: 0 # Needed to compare with base branch

      - name: Checkout PR merge snapshot
        uses: actions/checkout@v6
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          path: pr
          fetch-depth: 0 # Needed to compare with base branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: pip install -r trusted/.github/scripts/requirements.txt

      - name: Run Linter and Post Comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python trusted/.github/scripts/bot_orchestrator.py --repo-dir pr
