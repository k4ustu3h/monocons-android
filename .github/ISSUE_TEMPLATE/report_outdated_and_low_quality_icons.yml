name: Report outdated and low-quality icons
description: Request to change an icon if its design is outdated or quality is low.
labels: ["design and qa"]
body:
  - type: markdown
    attributes:
      value: |
        #### Before you start
        If an existing icon isn't applying automatically, [create a pull request instead](https://github.com/k4ustu3h/monocons-android/blob/main/CONTRIBUTING.md#adding-icons-and-missing-app-ids-to-monocons).

        #### How to find the current icon and app name
        Search [the appfilter.xml](https://github.com/k4ustu3h/monocons-android/blob/main/app/assets/appfilter.xml). In the line `drawable="..." name="..."`: `drawable` — icon name, `name` — app name.

        #### Sample response for outdated icons
        When an app's design changes, but Monocons still shows the old icon.

        ```
        X (formerly Twitter)
        Now: https://github.com/k4ustu3h/monocons-android/tree/main/svgs/twitter.svg
        New: https://cdn.cms-twdigitalassets.com/content/dam/about-twitter/x/brand-toolkit/logo-black.png.twimg.2560.png
        ```

        #### Sample response for low-quality icons
        Icons don't follow [the Monocons design guidelines](https://github.com/k4ustu3h/monocons-android/blob/main/CONTRIBUTING.md) or are inconsistent with other icons.

        ```
        https://github.com/k4ustu3h/monocons-android/tree/main/svgs/twitter.svg
        Wrong color.
        ```

  - type: textarea
    id: outdated-or-low-quality-icon-list
    attributes:
      label: Icons
      placeholder: Outdated or low-quality icons
    validations:
      required: true
